<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Kickstands Up brings motorcycle riders together to plan, share, and enjoy better rides."
    />
    <title>Kickstands Up | Better rides start here</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #35200e, #100d0a 55%);
        color: #f8f4ed;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main { width: min(680px, calc(100% - 48px)); padding: 72px 0; }
      .eyebrow { color: #f7a728; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; }
      h1 { font-size: clamp(3rem, 10vw, 5.5rem); letter-spacing: -.06em; line-height: .9; margin: 20px 0; }
      p { color: #d4cbc0; font-size: 1.15rem; line-height: 1.7; max-width: 560px; }
      .status { display: inline-block; margin-top: 20px; padding: 10px 14px; border: 1px solid #66584a; border-radius: 999px; color: #f7d18e; }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Kickstands Up</div>
      <h1>Better rides start here.</h1>
      <p id="message">
        KSU is building a better way for motorcycle riders to create rides, bring the right people together, and get moving.
      </p>
      <div class="status" id="status">The rider website is coming soon.</div>
    </main>
  </body>
  <script>
    if (new URLSearchParams(window.location.search).get('i')) {
      document.title = 'KSU ride invite';
      document.querySelector('h1').textContent = 'You’re invited to ride.';
      document.querySelector('#message').textContent = 'Open this invite in KSU to view the protected ride details and respond.';
      document.querySelector('#status').textContent = 'Open KSU or install the app to continue.';
    }
  </script>
</html>
