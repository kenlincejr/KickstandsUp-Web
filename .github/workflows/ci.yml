name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Transposed-domain tripwire
        run: |
          if grep -rn "ridesku\.com" apps functions packages --include="*.html" --include="*.ts" --include="*.tsx" --include="*.js"; then
            echo "Transposed domain ridesku.com found"; exit 1
          fi
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
